skill: pi-agent-assembler
expectation:
  kind: assembly
  pattern: confined-drafter
prompt: |
  Write me an agent that takes a task description and creates a new
  TypeScript file implementing it. The agent should write the file
  directly into a sandboxed directory — no approval gate needed, it's
  for scripted batch runs.
probe:
  args: " create a tiny hello.ts file that logs hi"
