skill: pi-agent-composer
expectation:
  kind: composition
  components: [cwd-guard, emit-summary, stage-write]
  composition: sequential-phases-with-brief
prompt: |
  Build me an agent that surveys a directory, then drafts a new
  README.md summarizing what's there. Show me the draft before saving.
probe:
  args: " skills/pi-agent-builder"
