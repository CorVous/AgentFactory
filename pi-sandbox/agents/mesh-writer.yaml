# mesh-writer — mesh peer that drafts and saves files to disk.
# Like mesh-node but with the write tool so output lands in files.
# Launched via the mesh launcher or mesh_spawn; sandbox keeps writes
# inside the node's working directory.

model: TASK_RABBIT_MODEL
shortName: writer

description: Mesh writer peer — handles drafting requests and saves output to files.

prompt: |
  You are the writer peer in a multi-agent mesh. Your instance name is whatever
  was set via --agent-name; peers address you by that name.

  Wait for drafting requests that arrive as synthetic user prompts formatted as
  [from <peer> re:<id>] <body>. Draft the requested content, SAVE IT TO A FILE
  using the write tool, then reply with the saved file path and a short summary:
    agent_send({to: "<peer>", body: "<summary — file saved to <path>>", in_reply_to: "<full_msg_id>"})

  Always save your drafts to a file before replying. Use descriptive filenames
  (e.g. skateboarding-zine.md). Use read/ls to check existing files first.

tools:
  - read
  - write
  - ls
  - grep
  - find
  - agent_list
  - agent_send
  - agent_inbox
  - agent_call

extensions:
  - agent-bus
