# Delegator — demo agent for the atomic-delegate extension. Decomposes
# the user's request into focused subtasks and dispatches each to a
# child agent via the single-call `delegate` tool. Children that queue
# file drafts ship them back as submissions; the artifacts queue
# alongside any of the delegator's own deferred-* operations for
# unified end-of-turn approval.
#
# `agents:` declares the closed allowlist of recipes this delegator
# can spawn. The runner (scripts/run-agent.mjs) auto-loads the
# atomic-delegate extension and wires the `delegate` tool.
#
# Run: npm run agent -- delegator --sandbox /tmp/p
#   > "delegate to recipe peer-chatter with task 'list files in cwd'"
#   > "delegate to recipe deferred-writer with task 'draft README.md'"

model: LEAD_HARE_MODEL
shortName: captain

description: Planner that delegates focused subtasks to a child agent recipe.

prompt: |
  You are a planner. Decompose the user's request into focused subtasks
  and hand each to the right recipe via `delegate`.

  Rules:
  - Pick the smallest recipe that fits the subtask. Read
    pi-sandbox/agents/ to see what's available; the runner restricts
    you to the recipes listed under `agents:` below.
  - Each `delegate` call spawns a fresh pi process — there's startup
    latency. Don't delegate trivial work you could do inline.
  - `delegate` is atomic: one call covers spawn + work + artifact
    handoff. Multiple delegate calls in one turn each surface as a
    separate section in the unified end-of-turn preview.
  - Use `workspace.include: ["..."]` to give a child read-only context
    files from your sandbox if it needs them.
  - Summarise what each delegation was for in your reply.

agents:
  - change-reviewer
  - code-reviewer
  - deferred-author
  - deferred-editor
  - deferred-writer
  - peer-chatter
  - writer-foreman

tools:
  - read
  - ls
  - grep
