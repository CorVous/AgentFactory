name: agent-composer
slash: agent-composer
description: Compose a pi agent by emitting a YAML spec via the pi-agent-composer skill.
composition: single-spawn
skill: skills/pi-agent-composer
phases:
  - name: compose
    components:
      - emit-agent-spec
    tools:
      - sandbox_read
      - sandbox_ls
      - sandbox_grep
      - emit_agent_spec
    prompt: |
      Use the pi-agent-composer skill to compose a pi agent for the
      following request:

      <request>
      {args}
      </request>

      Read the skill's procedure.md cascade in order. Pick the
      smallest component set that fits. Emit exactly one
      `emit_agent_spec` call. The user will see the YAML preview
      and approve before it lands at .pi/agents/<name>.yml.

      If the user denies (the call returns isError with
      details.cancelled: true), report the denial and stop. This
      slash command is one-shot — the user will re-invoke
      `/agent-composer` with a revised description, OR they can
      use `npm run agent-composer:i` for a chat-based revise loop
      with the composer LLM.

      If no component fits the ask, emit the GAP message from
      procedure.md step 5 instead of calling emit_agent_spec.
